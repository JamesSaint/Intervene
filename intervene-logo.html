<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>intervene</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    padding: 40px;
  }

  .intervene-logo {
    display: inline-flex;
    align-items: center;
    gap: 25px;
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #111;
  }

  .intervene-wordmark {
    font-size: clamp(56px, 9vw, 132px);
    font-weight: 500;
    letter-spacing: -0.055em;
    line-height: 0.9;
  }

  .intervene-mark {
    --w: 60px;
    --h: 130px;
    --gap: 22px;

    position: relative;
    width: calc(var(--w) * 2 + var(--gap));
    height: var(--h);
  }

  .panel {
    position: absolute;
    top: 0;
    width: var(--w);
    height: var(--h);
    background: #111;
  }

  .panel-left {
    left: 0;
    clip-path: polygon(
      0 0,
      100% 18%,
      100% 82%,
      0 100%
    );
  }

  .panel-right {
    right: 0;
    clip-path: polygon(
      100% 0,
      0 18%,
      0 82%,
      100% 100%
    );
  }
</style>
</head>
<body>
  <div class="intervene-logo">
    <div class="intervene-mark" aria-hidden="true">
      <span class="panel panel-left"></span>
      <span class="panel panel-right"></span>
    </div>
    <div class="intervene-wordmark">intervene</div>
  </div>
</body>
</html>
